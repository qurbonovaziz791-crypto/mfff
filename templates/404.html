{% extends "base.html" %}

{% block title %}Sahifa topilmadi (404){% endblock %}

{% block content %}
<div class="mx-auto max-w-2xl px-4 py-10">
  <div class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm">
    <div class="flex items-start gap-4">
      <div class="shrink-0 rounded-xl bg-slate-100 px-3 py-2 text-slate-700">
        <span class="text-sm font-semibold">404</span>
      </div>
      <div class="min-w-0">
        <h1 class="text-xl font-semibold text-slate-900">Sahifa topilmadi</h1>
        <p class="mt-2 text-slate-600">
          Kechirasiz, so‘ralgan sahifa o‘chirib yuborilgan yoki manzil noto‘g‘ri bo‘lishi mumkin.
        </p>
        <div class="mt-5 flex flex-wrap gap-3">
          <a href="/" class="inline-flex items-center justify-center rounded-xl bg-slate-900 px-4 py-2 text-sm font-medium text-white hover:bg-slate-800">
            Bosh sahifa
          </a>
          <button type="button" onclick="history.back()" class="inline-flex items-center justify-center rounded-xl border border-slate-200 bg-white px-4 py-2 text-sm font-medium text-slate-900 hover:bg-slate-50">
            Orqaga
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
