{% load static %}
<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MYFEEL | Tizimga kirish</title>
    <link rel="stylesheet" href="{% static 'vendor/bootstrap/css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'vendor/bootstrap-icons/css/bootstrap-icons.min.css' %}">
    <link rel="icon" href="{% static 'logo/mf.png' %}">

    <style>
        :root {
            --brand-primary: #ff4b2b;
            --brand-secondary: #ff416c;
            --brand-gradient: linear-gradient(135deg, #ff416c, #ff4b2b);
            --brand-glow: rgba(255, 65, 108, 0.22);
            --surface: #ffffff;
            --surface-subtle: #f8f9fa;
            --border-light: #eef0f2;
            --text-primary: #1a1a2e;
            --text-secondary: #6b7280;
            --text-muted: #9ca3af;
            --input-bg: #f7f8fa;
            --radius-md: 14px;
            --transition: cubic-bezier(0.4, 0, 0.2, 1);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--surface-subtle);
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .page-wrapper { display: flex; height: 100vh; width: 100%; }

        .branding-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--brand-gradient);
            position: relative;
            overflow: hidden;
        }
        .branding-panel::before {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: rgba(255,255,255,0.06);
            top: -200px;
            right: -150px;
            animation: floatBubble 20s ease-in-out infinite;
        }
        .branding-panel::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: rgba(255,255,255,0.04);
            bottom: -100px;
            left: -100px;
            animation: floatBubble 15s ease-in-out infinite reverse;
        }
        .brand-shape {
            position: absolute;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: rgba(255,255,255,0.03);
            top: 50%;
            left: 60%;
            animation: floatBubble 18s ease-in-out infinite 2s;
        }
        .branding-logo {
            width: 112px;
            filter: brightness(0) invert(1);
            margin-bottom: 12px;
            position: relative;
            z-index: 1;
            animation: fadeInUp 0.8s var(--transition);
        }
        .branding-subtitle {
            color: rgba(255,255,255,0.88);
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            position: relative;
            z-index: 1;
            animation: fadeInUp 0.8s var(--transition) 0.2s both;
        }

        .form-panel {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 28px 24px 32px;
            background: var(--surface);
        }
        .form-wrapper { width: 100%; max-width: 380px; animation: fadeInUp 0.6s var(--transition); }
        .form-logo {
            width: 72px;
            height: auto;
            object-fit: contain;
            margin-bottom: 18px;
            display: block;
            margin-left: auto;
            margin-right: auto;
            transition: transform 0.3s var(--transition);
            opacity: 0.9;
        }
        .form-logo:hover { transform: scale(1.06); opacity: 1; }
        .form-header { text-align: center; margin-bottom: 22px; }
        .form-title { font-size: 1.35rem; font-weight: 700; color: var(--text-primary); margin-bottom: 6px; letter-spacing: -0.03em; }
        .form-subtitle { font-size: 13px; color: var(--text-muted); line-height: 1.45; }

        .input-group-custom { position: relative; margin-bottom: 14px; }
        .input-group-custom .form-control {
            width: 100%;
            height: 46px;
            padding: 12px 14px 12px 44px;
            border: 1px solid var(--border-light);
            border-radius: 12px;
            font-size: 14px;
            font-weight: 400;
            color: var(--text-primary);
            background: var(--input-bg);
            transition: all 0.3s var(--transition);
            outline: none;
        }
        .input-group-custom .form-control:hover { border-color: #e0e3e8; background: var(--surface); }
        .input-group-custom .form-control:focus {
            border-color: var(--brand-primary);
            background: var(--surface);
            box-shadow: 0 0 0 3px var(--brand-glow);
        }
        .input-group-custom .form-control::placeholder { color: var(--text-muted); }
        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 17px;
            color: var(--text-muted);
            transition: color 0.3s var(--transition), transform 0.3s var(--transition);
            z-index: 2;
            pointer-events: none;
        }
        .input-group-custom .form-control:focus ~ .input-icon {
            color: var(--brand-primary);
            transform: translateY(-50%) scale(1.1);
        }

        .password-toggle {
            position: absolute;
            right: 2px;
            top: 50%;
            transform: translateY(-50%);
            height: 40px;
            width: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: none;
            border: none;
            font-size: 17px;
            color: var(--text-muted);
            cursor: pointer;
            transition: color 0.25s var(--transition), transform 0.25s var(--transition);
            z-index: 2;
            border-radius: 8px;
        }
        .password-toggle:hover { color: var(--brand-primary); transform: translateY(-50%) scale(1.1); }
        .password-toggle:active { transform: translateY(-50%) scale(0.95); }

        .alert-custom {
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 12px;
            padding: 10px 14px;
            color: #dc2626;
            font-size: 12px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
            animation: shakeX 0.5s var(--transition);
        }
        .alert-custom .bi { font-size: 17px; flex-shrink: 0; }

        .btn-login {
            width: 100%;
            height: 46px;
            background: var(--brand-gradient);
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
            letter-spacing: 0.2px;
            margin-top: 4px;
        }
        .btn-login:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 6px 22px rgba(255, 75, 43, 0.28); }
        .btn-login:disabled { background: linear-gradient(135deg, #fce4e4, #fdd); color: #fca5a5; cursor: not-allowed; box-shadow: none; }

        .btn-login .spinner-border {
            width: 1rem;
            height: 1rem;
            border-width: 0.12em;
            flex-shrink: 0;
        }

        .divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; }
        .divider-line { flex: 1; height: 1px; background: var(--border-light); }
        .divider-text { font-size: 10px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.12em; }

        .register-box {
            text-align: center;
            padding: 14px 16px;
            background: var(--surface-subtle);
            border-radius: 12px;
            border: 1px solid var(--border-light);
            transition: border-color 0.3s var(--transition);
        }
        .register-box p { font-size: 12px; color: var(--text-secondary); margin: 0; line-height: 1.45; }
        .register-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--brand-primary);
            font-weight: 600;
            text-decoration: none;
            margin-top: 10px;
            padding: 8px 16px;
            border-radius: 10px;
            background: #fff0ec;
            font-size: 12px;
            transition: all 0.25s var(--transition);
        }
        .register-link:hover { background: #ffe4dd; color: #e63e1a; transform: translateY(-1px); box-shadow: 0 3px 10px rgba(255, 75, 43, 0.12); }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes shakeX { 0%, 100% { transform: translateX(0); } 20% { transform: translateX(-6px); } 40% { transform: translateX(6px); } 60% { transform: translateX(-4px); } 80% { transform: translateX(4px); } }
        @keyframes floatBubble { 0%, 100% { transform: translate(0, 0); } 25% { transform: translate(10px, -15px); } 50% { transform: translate(-5px, 10px); } 75% { transform: translate(8px, 5px); } }

        @media (max-width: 768px) {
            .page-wrapper { flex-direction: column; }
            .branding-panel { flex: 0 0 auto; height: min(28vh, 160px); min-height: 132px; border-radius: 0 0 24px 24px; padding: 12px 16px; }
            .branding-logo { width: 72px; margin-bottom: 8px; }
            .branding-subtitle { font-size: 10px; letter-spacing: 0.1em; }
            .form-panel { flex: 1; padding: 20px 18px 24px; align-items: flex-start; overflow-y: auto; }
            .form-logo { display: none; }
            .form-header { margin-bottom: 18px; }
            .form-title { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
<div class="page-wrapper">

    <div class="branding-panel">
        <div class="brand-shape"></div>
        <img src="{% static 'logo/mf.png' %}" alt="MYFEEL" class="branding-logo">
        <div class="branding-subtitle">Hissiyotlaringgizga erkinlik bering</div>
    </div>

    <div class="form-panel">
        <div class="form-wrapper">

            <img src="{% static 'logo/mf.png' %}" alt="MYFEEL" class="form-logo">

            <div class="form-header">
                <h1 class="form-title">Xush kelibsiz</h1>
                <p class="form-subtitle">Hisobingizga kirish uchun ma'lumotlarni kiriting</p>
            </div>

            {% if error %}
            <div class="alert-custom">
                <i class="bi bi-exclamation-triangle-fill"></i>
                <span>{{ error }}</span>
            </div>
            {% endif %}

            <form id="loginForm" method="POST" action="{% url 'login' %}">
                {% csrf_token %}

                <div class="input-group-custom">
                    <input type="text" class="form-control" id="username" name="username" placeholder="Foydalanuvchi logini" required autocomplete="username">
                    <i class="bi bi-person input-icon"></i>
                </div>

                <div class="input-group-custom">
                    <input type="password" class="form-control" id="password" name="password" placeholder="Parol" required autocomplete="current-password">
                    <i class="bi bi-lock input-icon"></i>
                    <button type="button" class="password-toggle" id="togglePassword" aria-label="Parolni ko'rsatish">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>

                <button type="submit" id="loginBtn" class="btn-login" disabled>
                    <span class="btn-text">Kirish</span>
                    <span class="btn-arrow">→</span>
                    <span class="spinner-border" role="status" aria-hidden="true"></span>
                </button>
            </form>

            <div class="divider">
                <span class="divider-line"></span>
                <span class="divider-text">Yoki</span>
                <span class="divider-line"></span>
            </div>

            <div class="register-box">
                <p>Akkauntingiz yo'qmi?</p>
                <button type="button" class="register-link" id="hy-copy-telegram-bot" data-bot="@MyFeelAuth_bot">
                    <i class="bi bi-telegram"></i>
                    Bot nomini nusxalash
                </button>
                <p style="margin-top:8px;font-size:11px;color:var(--text-muted)">Telegram bot: <strong>@MyFeelAuth_bot</strong></p>
            </div>

        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const toggleBtn = document.getElementById('togglePassword');
        const toggleIcon = toggleBtn.querySelector('i');
        const loginForm = document.getElementById('loginForm');

        function validate() {
            const ok = usernameInput.value.trim().length > 0 && passwordInput.value.length >= 6;
            if (ok) loginBtn.removeAttribute('disabled');
            else loginBtn.setAttribute('disabled', 'true');
        }

        usernameInput.addEventListener('input', validate);
        passwordInput.addEventListener('input', validate);

        toggleBtn.addEventListener('click', function () {
            const show = passwordInput.type === 'password';
            passwordInput.type = show ? 'text' : 'password';
            toggleIcon.className = show ? 'bi bi-eye-slash' : 'bi bi-eye';
            this.setAttribute('aria-label', show ? 'Parolni yashirish' : 'Parolni ko\'rsatish');
        });

        loginForm.addEventListener('submit', function () {
            loginBtn.setAttribute('disabled', 'true');
        });

        const botBtn = document.getElementById('hy-copy-telegram-bot');
        if (botBtn) {
            botBtn.addEventListener('click', function () {
                const txt = (botBtn.getAttribute('data-bot') || '').trim();
                if (!txt) return;
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(txt).then(() => {
                        botBtn.innerHTML = "<i class='bi bi-check2'></i> Nusxalandi";
                        setTimeout(() => { botBtn.innerHTML = "<i class='bi bi-telegram'></i> Bot nomini nusxalash"; }, 1600);
                    }).catch(() => {});
                }
            });
        }

        validate();
        usernameInput.focus();
    });
</script>
</body>
</html>
