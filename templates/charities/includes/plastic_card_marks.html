{# Plastik karta burchagi: faqat bitta brend CSS modifier orqali ko‘rinadi #}
<div class="hy-plastic-card__marks" aria-hidden="true">
    <span class="hy-plastic-card__mark hy-plastic-card__mark--visa">
        <svg class="hy-plastic-card__mark-svg" width="72" height="22" viewBox="0 0 72 22" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <text x="0" y="17" fill="currentColor" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="17" font-weight="800" font-style="italic" letter-spacing="0.06em">VISA</text>
        </svg>
    </span>
    <span class="hy-plastic-card__mark hy-plastic-card__mark--mastercard">
        <svg class="hy-plastic-card__mark-svg" width="44" height="28" viewBox="0 0 44 28" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <circle cx="17" cy="14" r="11" fill="#EB001B"/>
            <circle cx="27" cy="14" r="11" fill="#F79E1B" fill-opacity="0.88"/>
        </svg>
    </span>
    <span class="hy-plastic-card__mark hy-plastic-card__mark--uzcard">
        <svg class="hy-plastic-card__mark-svg hy-plastic-card__mark-svg--uz" width="96" height="26" viewBox="0 0 96 26" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <text x="0" y="18" fill="currentColor" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="15" font-weight="800" letter-spacing="0.14em">UZCARD</text>
        </svg>
    </span>
    <span class="hy-plastic-card__mark hy-plastic-card__mark--humo">
        <svg class="hy-plastic-card__mark-svg hy-plastic-card__mark-svg--humo" width="88" height="30" viewBox="0 0 88 30" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <rect x="0" y="0" width="88" height="5" fill="#E4002B"/>
            <rect x="0" y="6" width="88" height="5" fill="#FFFFFF"/>
            <rect x="0" y="12" width="88" height="5" fill="#004C97"/>
            <text x="0" y="27" fill="currentColor" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="14" font-weight="800" letter-spacing="0.1em">HUMO</text>
        </svg>
    </span>
    <span class="hy-plastic-card__mark hy-plastic-card__mark--mir">
        <svg class="hy-plastic-card__mark-svg" width="26" height="26" viewBox="0 0 56 26" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <text x="0" y="19" fill="currentColor" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="18" font-weight="800" letter-spacing="0.12em">MIR</text>
        </svg>
    </span>
    <span class="hy-plastic-card__mark hy-plastic-card__mark--unionpay">
        <svg class="hy-plastic-card__mark-svg hy-plastic-card__mark-svg--up" width="100" height="30" viewBox="0 0 100 30" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <text x="0" y="13" fill="currentColor" font-size="11" font-weight="800" letter-spacing="0.04em">UNIONPAY</text>
            <text x="0" y="26" fill="currentColor" font-size="10" font-weight="700" opacity="0.9">银联</text>
        </svg>
    </span>
    <span class="hy-plastic-card__mark hy-plastic-card__mark--generic">
        <span class="hy-plastic-card__mark-generic-text">DEBIT</span>
    </span>
</div>
